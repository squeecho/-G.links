<style>
/* =========================================================
   IGGG Design System v1.1 — tokens
   ========================================================= */
:root {
  --fz-display-xl: clamp(3rem, 7vw, 5rem);
  --fz-display-l:  clamp(2rem, 5vw, 3rem);
  --fz-display-m:  1.5rem;
  --fz-body:       0.9375rem;
  --fz-mono-l:     0.8125rem;
  --fz-mono-m:     0.6875rem;
  --fz-mono-s:     0.625rem;
  --ls-display:    -0.02em;
  --ls-mono:       0.08em;
  --ls-mono-wide:  0.18em;
  --line-1: 1px;
  --radius-cap: 999px;
  --radius-md: 4px;
  --sp-1: 4px; --sp-2: 8px; --sp-3: 12px; --sp-4: 16px;
  --sp-6: 24px; --sp-8: 32px;
  --ease-out: cubic-bezier(0.22, 1, 0.36, 1);
  --dur-fast: 120ms;
  --dur-base: 200ms;
  --ff-display: "Inter", "Pretendard Variable", system-ui, sans-serif;
  --ff-mono:    "JetBrains Mono", ui-monospace, monospace;
  --ff-body:    "Pretendard Variable", "Inter", system-ui, sans-serif;
}

/* Dark (default) */
:root[data-theme="dark"] {
  --bg:        #0a0a0a;
  --bg-elev:   #141414;
  --bg-input:  #2d2d2d;
  --bg-input-focus: #383838;
  --fg:        #f4f2ed;
  --fg-mute:   rgba(244, 242, 237, 0.6);
  --fg-faint:  rgba(244, 242, 237, 0.4);
  --line:      rgba(244, 242, 237, 0.55);
  --line-soft: rgba(244, 242, 237, 0.35);
  --accent:    #f4f2ed;
  --accent-fg: #0a0a0a;
  --danger:    #ff6b5e;
  --grain-opacity: 0.08;
  --logo-filter: invert(1);
}

/* Light */
:root[data-theme="light"] {
  --bg:        #f4f2ed;
  --bg-elev:   #ebe8e1;
  --bg-input:  #ffffff;
  --bg-input-focus: #ffffff;
  --fg:        #0a0a0a;
  --fg-mute:   rgba(10, 10, 10, 0.62);
  --fg-faint:  rgba(10, 10, 10, 0.32);
  --line:      rgba(10, 10, 10, 0.55);
  --line-soft: rgba(10, 10, 10, 0.16);
  --accent:    #0a0a0a;
  --accent-fg: #f4f2ed;
  --danger:    #c8302a;
  --grain-opacity: 0.04;
  --logo-filter: none;
}

/* System fallback */
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg: #f4f2ed; --bg-elev: #ebe8e1;
    --bg-input: #ffffff; --bg-input-focus: #ffffff;
    --fg: #0a0a0a;
    --fg-mute: rgba(10,10,10,0.62);
    --fg-faint: rgba(10,10,10,0.32);
    --line: rgba(10,10,10,0.55); --line-soft: rgba(10,10,10,0.16);
    --accent: #0a0a0a; --accent-fg: #f4f2ed;
    --grain-opacity: 0.04;
    --logo-filter: none;
  }
}

/* ---- Reset ---- */
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--ff-body);
  background: var(--bg);
  color: var(--fg);
  font-size: var(--fz-body);
  min-height: 100dvh;
  -webkit-font-smoothing: antialiased;
  transition: background var(--dur-base), color var(--dur-base);
}

/* Grain overlay */
body::before {
  content: "";
  position: fixed; inset: 0; pointer-events: none; z-index: 1;
  opacity: var(--grain-opacity);
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)'/></svg>");
  mix-blend-mode: overlay;
}
body > * { position: relative; z-index: 2; }

/* ---- Theme toggle ---- */
.theme-toggle {
  position: fixed;
  top: var(--sp-3);
  right: var(--sp-3);
  z-index: 100;
  background: var(--bg);
  border: var(--line-1) solid var(--line);
  border-radius: var(--radius-cap);
  padding: var(--sp-1) var(--sp-3);
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-m);
  letter-spacing: var(--ls-mono);
  color: var(--fg);
  cursor: pointer;
  text-transform: uppercase;
  transition: background var(--dur-fast);
}
.theme-toggle:hover { background: var(--bg-elev); }

/* =========================================================
   LOGIN SCREEN
   ========================================================= */
.login-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100dvh;
  padding: var(--sp-8);
  animation: fadeIn 0.6s var(--ease-out);
}

.login-logo {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: var(--sp-2);
  margin-bottom: var(--sp-8);
}

.logo-img {
  height: 80px;
  width: auto;
  display: block;
  filter: var(--logo-filter);
}

.logo-sub {
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-l);
  font-weight: 400;
  letter-spacing: var(--ls-mono-wide);
  color: var(--fg-faint);
  text-transform: lowercase;
}

.login-box {
  width: 100%;
  max-width: 320px;
}

/* Labels — 한글 친화 (v1.1: body font, no uppercase) */
.input-group {
  position: relative;
  margin-bottom: var(--sp-4);
}

.input-group .label {
  display: block;
  font-family: var(--ff-body);
  font-weight: 600;
  font-size: var(--fz-body);
  color: var(--fg);
  margin-bottom: var(--sp-2);
}
.label__sub {
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-s);
  letter-spacing: var(--ls-mono);
  color: var(--fg-faint);
  text-transform: uppercase;
  margin-left: var(--sp-2);
  font-weight: 400;
}

/* Inputs — v1.1: bg-input #2d2d2d, focus: bg-input-focus */
.input {
  width: 100%;
  background: var(--bg-input);
  border: var(--line-1) solid var(--line-soft);
  border-radius: var(--radius-md);
  padding: var(--sp-2) var(--sp-3);
  font-size: var(--fz-body);
  font-family: var(--ff-body);
  color: var(--fg);
  outline: none;
  transition: border-color var(--dur-fast) var(--ease-out),
              background var(--dur-fast) var(--ease-out);
}
.input:focus {
  border-color: var(--fg);
  background: var(--bg-input-focus);
}

/* ID input — mono font for credentials */
.input-id {
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-l);
  letter-spacing: var(--ls-mono);
  padding: var(--sp-3);
}

/* Auto-login checkbox */
.auto-login {
  display: flex;
  align-items: center;
  gap: var(--sp-2);
  margin: var(--sp-4) 0 var(--sp-6);
  cursor: pointer;
}
.auto-login input[type="checkbox"] { display: none; }

.checkbox-custom {
  width: 16px;
  height: 16px;
  border: var(--line-1) solid var(--line);
  border-radius: 2px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--dur-fast);
  flex-shrink: 0;
}
.auto-login input:checked + .checkbox-custom {
  background: var(--accent);
  border-color: var(--accent);
}
.auto-login input:checked + .checkbox-custom::after {
  content: '';
  width: 4px;
  height: 8px;
  border: solid var(--accent-fg);
  border-width: 0 1.5px 1.5px 0;
  transform: rotate(45deg) translateY(-1px);
}
.auto-login span {
  font-family: var(--ff-body);
  font-size: var(--fz-body);
  color: var(--fg-mute);
}

/* Login button — btn-primary (v1.1: 페이지당 1~2개) */
.btn-login {
  width: 100%;
  background: var(--accent);
  color: var(--accent-fg);
  border: var(--line-1) solid var(--accent);
  border-radius: var(--radius-md);
  padding: 14px;
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-l);
  font-weight: 500;
  letter-spacing: var(--ls-mono);
  cursor: pointer;
  text-transform: uppercase;
  transition: opacity var(--dur-fast);
}
.btn-login:hover { opacity: 0.85; }
.btn-login:active { transform: scale(0.98); }

.login-error {
  font-family: var(--ff-body);
  font-size: var(--fz-mono-m);
  color: var(--danger);
  text-align: center;
  margin-top: var(--sp-4);
  min-height: 1.2em;
  opacity: 0;
  transition: opacity 0.3s;
}
.login-error.visible { opacity: 1; }

/* =========================================================
   LINKS SCREEN
   ========================================================= */
.links-screen {
  display: none;
  min-height: 100dvh;
  max-width: 520px;
  margin: 0 auto;
  padding: var(--sp-4);
  animation: fadeIn 0.5s var(--ease-out);
}

/* Hero */
.links-hero {
  padding: var(--sp-8) 0 var(--sp-4);
  display: flex;
  align-items: flex-end;
  justify-content: space-between;
  border-bottom: var(--line-1) dashed var(--line-soft);
  margin-bottom: var(--sp-6);
}

.links-hero-brand {
  display: flex;
  flex-direction: column;
  gap: var(--sp-1);
}

.links-hero-studio {
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-s);
  font-weight: 400;
  letter-spacing: 0.06em;
  color: var(--fg-faint);
  transform: scaleX(0.9);
  transform-origin: left;
}

.links-hero-title {
  font-family: var(--ff-display);
  font-weight: 900;
  font-size: var(--fz-display-m);
  letter-spacing: var(--ls-display);
  line-height: 1;
}

.logout-btn {
  background: none;
  border: var(--line-1) solid var(--line-soft);
  border-radius: var(--radius-cap);
  color: var(--fg-mute);
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-s);
  letter-spacing: var(--ls-mono);
  cursor: pointer;
  padding: var(--sp-1) var(--sp-3);
  text-transform: uppercase;
  transition: color var(--dur-fast), border-color var(--dur-fast);
}
.logout-btn:hover {
  color: var(--danger);
  border-color: var(--danger);
}

/* Logout confirm bar */
.logout-confirm {
  background: var(--bg-elev);
  border: var(--line-1) solid var(--line);
  border-radius: var(--radius-md);
  padding: var(--sp-3) var(--sp-4);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: var(--sp-3);
  margin-bottom: var(--sp-4);
  animation: fadeIn 0.2s var(--ease-out);
}
.logout-confirm span {
  font-family: var(--ff-body);
  font-size: var(--fz-body);
  font-weight: 500;
}
.logout-confirm-btns {
  display: flex;
  gap: var(--sp-2);
}
.btn-confirm-yes {
  background: var(--danger);
  color: #fff;
  border: none;
  border-radius: var(--radius-cap);
  padding: var(--sp-1) var(--sp-4);
  font-family: var(--ff-body);
  font-size: var(--fz-mono-l);
  font-weight: 500;
  cursor: pointer;
}
.btn-confirm-no {
  background: transparent;
  color: var(--fg-mute);
  border: var(--line-1) solid var(--line-soft);
  border-radius: var(--radius-cap);
  padding: var(--sp-1) var(--sp-4);
  font-family: var(--ff-body);
  font-size: var(--fz-mono-l);
  cursor: pointer;
}
.btn-confirm-no:hover { color: var(--fg); border-color: var(--line); }

/* Category group */
.category {
  margin-bottom: var(--sp-6);
}
.category + .category {
  border-top: var(--line-1) solid var(--line-soft);
  padding-top: var(--sp-6);
}

.category-label {
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-s);
  font-weight: 500;
  letter-spacing: var(--ls-mono-wide);
  color: var(--fg-faint);
  text-transform: uppercase;
  margin-bottom: var(--sp-3);
}

/* Link card */
.link-card {
  display: flex;
  align-items: center;
  gap: var(--sp-4);
  padding: var(--sp-3) var(--sp-4);
  background: var(--bg-elev);
  border: var(--line-1) solid var(--line-soft);
  border-radius: var(--radius-md);
  margin-bottom: var(--sp-2);
  text-decoration: none;
  color: var(--fg);
  transition: border-color var(--dur-base) var(--ease-out),
              transform var(--dur-fast);
  cursor: pointer;
}
.link-card:hover {
  border-color: var(--line);
  transform: translateX(3px);
}
.link-card:active {
  transform: translateX(3px) scale(0.99);
}

.link-icon {
  width: 44px;
  height: 44px;
  border-radius: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
  background: transparent;
  border: var(--line-1) solid var(--line-soft);
}
.link-icon svg {
  width: 22px;
  height: 22px;
  stroke: var(--fg);
  stroke-width: 0.7;
  fill: none;
}

.link-info {
  flex: 1;
  min-width: 0;
}

.link-name {
  font-family: var(--ff-body);
  font-size: var(--fz-body);
  font-weight: 500;
  margin-bottom: 2px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.link-desc {
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-s);
  color: var(--fg-faint);
  letter-spacing: var(--ls-mono);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.link-arrow {
  flex-shrink: 0;
  transition: opacity var(--dur-fast);
  opacity: 0.3;
}
.link-arrow svg {
  width: 14px;
  height: 14px;
  stroke: var(--fg);
  stroke-width: 0.7;
  fill: none;
}
.link-card:hover .link-arrow {
  opacity: 0.8;
}

/* Footer */
.links-footer {
  border-top: var(--line-1) dashed var(--line-soft);
  margin-top: var(--sp-8);
  padding-top: var(--sp-4);
  display: flex;
  justify-content: space-between;
  align-items: center;
  gap: var(--sp-3);
  flex-wrap: wrap;
  padding-bottom: var(--sp-8);
}
.links-footer span {
  font-family: var(--ff-mono);
  font-size: var(--fz-mono-s);
  letter-spacing: var(--ls-mono);
  color: var(--fg-faint);
  text-transform: uppercase;
}

/* Toast */
#toast {
  display: none;
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--accent);
  color: var(--accent-fg);
  padding: var(--sp-3) var(--sp-4);
  border-radius: var(--radius-cap);
  font-family: var(--ff-body);
  font-size: var(--fz-body);
  font-weight: 500;
  z-index: 1000;
}

/* Animations */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}

.link-card {
  animation: cardIn 0.35s var(--ease-out) backwards;
}
@keyframes cardIn {
  from { opacity: 0; transform: translateX(-6px); }
  to { opacity: 1; transform: translateX(0); }
}

@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(5px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(3px); }
}
.shake { animation: shake 0.4s ease; }

/* Responsive */
@media (max-width: 480px) {
  .links-screen { padding: var(--sp-3); }
  .link-card { padding: var(--sp-3); gap: var(--sp-3); }
}
</style>
</head>
<body>

<!-- Theme toggle -->

<script>
// ── Theme ──
function toggleTheme() {
  const root = document.documentElement;
  const cur = root.dataset.theme || 'dark';
  const next = cur === 'dark' ? 'light' : 'dark';
  root.dataset.theme = next;
  localStorage.setItem('iggg-theme', next);
  document.getElementById('themeToggle').textContent = next === 'dark' ? 'dark / 01' : 'light / 02';
}
(function initTheme(){
  const saved = localStorage.getItem('iggg-theme');
  const sys = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
  const t = saved || sys;
  document.documentElement.dataset.theme = t;
  document.addEventListener('DOMContentLoaded', () => {
    const btn = document.getElementById('themeToggle');
    if (btn) btn.textContent = t === 'dark' ? 'dark / 01' : 'light / 02';
  });
})();

// ── Toast ──
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2000);
}

async function sha256(text) {
  const encoder = new TextEncoder();
  const data = encoder.encode(text);
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2, '0')).join('');
}

//  AUTH LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const TOKEN_KEY = 'ig_links_token';

function makeToken(id, hash) {
  return btoa(JSON.stringify({ id, hash, ts: Date.now() }));
}

function checkAutoLogin() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (token) {
    try {
      const decoded = JSON.parse(atob(token));
      if (decoded.hash && ACCOUNT_HASHES.includes(decoded.hash)) {
        showLinks();
        return;
      }
    } catch {}
    localStorage.removeItem(TOKEN_KEY);
  }
}

async function handleLogin() {
  const id = document.getElementById('userId').value.trim();
  const pw = document.getElementById('userPw').value;
  const auto = document.getElementById('autoLogin').checked;
  const errEl = document.getElementById('loginError');

  const hash = await sha256(id + ':' + pw);
  const valid = ACCOUNT_HASHES.includes(hash);

  if (!valid) {
    errEl.textContent = 'ID 또는 비밀번호가 일치하지 않습니다';
    errEl.classList.add('visible');
    document.querySelector('.login-box').classList.add('shake');
    setTimeout(() => document.querySelector('.login-box').classList.remove('shake'), 400);
    return;
  }

  if (auto) {
    localStorage.setItem(TOKEN_KEY, makeToken(id, hash));
  }

  showLinks();
}

function requestLogout() {
  document.getElementById('logoutConfirm').style.display = 'flex';
}
function cancelLogout() {
  document.getElementById('logoutConfirm').style.display = 'none';
}
function handleLogout() {
  document.getElementById('logoutConfirm').style.display = 'none';
  localStorage.removeItem(TOKEN_KEY);
  document.getElementById('linksScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('userId').value = '';
  document.getElementById('userPw').value = '';
  document.getElementById('loginError').classList.remove('visible');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function showLinks() {
  document.getElementById('loginScreen').style.display = 'none';
  const screen = document.getElementById('linksScreen');
  screen.style.display = 'block';

  const container = document.getElementById('linksContainer');
  container.innerHTML = '';

  let cardIndex = 0;

  LINKS.forEach(group => {
    const cat = document.createElement('div');
    cat.className = 'category';

    if (group.category) {
      const label = document.createElement('div');
      label.className = 'category-label';
      label.textContent = group.category;
      cat.appendChild(label);
    }

    group.items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'link-card';
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = `${cardIndex * 0.05}s`;
      a.innerHTML = `
        <div class="link-icon">${item.icon}</div>
        <div class="link-info">
          <div class="link-name">${item.name}</div>
          <div class="link-desc">${item.desc}</div>
        </div>
        <div class="link-arrow"><svg viewBox="0 0 20 20"><line x1="5" y1="10" x2="15" y2="10"/><polyline points="11 6 15 10 11 14"/></svg></div>
      `;
      cat.appendChild(a);
      cardIndex++;
    });

    container.appendChild(cat);
  });
}

// Enter 키 로그인
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
    handleLogin();
  }
});
