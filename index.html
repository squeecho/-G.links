<style>
  :root {
    --bg: #0a0a0a;
    --surface: #141414;
    --surface-hover: #1a1a1a;
    --border: #222;
    --border-light: #333;
    --text: #e8e4df;
    --text-dim: #807a72;
    --text-muted: #4a4640;
    --accent: #c9b99a;
    --accent-dim: #8a7d65;
    --danger: #a04040;
    --mono: 'DM Mono', monospace;
    --sans: 'Noto Sans KR', -apple-system, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    min-height: 100dvh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LOGIN SCREEN ── */
  .login-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100dvh;
    padding: 2rem;
    animation: fadeIn 0.6s ease;
  }

  .login-logo {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.3rem;
    margin-bottom: 3rem;
  }

  .logo-img {
    height: 80px;
    width: auto;
    display: block;
  }

  .logo-works {
    font-family: var(--mono);
    font-size: 0.85rem;
    font-weight: 300;
    letter-spacing: 0.25em;
    color: var(--text-dim);
    text-transform: lowercase;
  }

  .logo-img-sm {
    height: 28px;
    width: auto;
    display: inline-block;
    vertical-align: middle;
  }

  .logo-works-sm {
    font-family: var(--mono);
    font-size: 0.75rem;
    font-weight: 300;
    letter-spacing: 0.2em;
    color: var(--text-dim);
    text-transform: lowercase;
    margin-left: 0.3rem;
    vertical-align: middle;
  }

  .login-box {
    width: 100%;
    max-width: 320px;
  }

  .input-group {
    position: relative;
    margin-bottom: 1rem;
  }

  .input-group label {
    display: block;
    font-family: var(--mono);
    font-size: 0.7rem;
    font-weight: 400;
    letter-spacing: 0.1em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.5rem;
  }

  .input-group input[type="text"],
  .input-group input[type="password"] {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: var(--mono);
    font-size: 0.95rem;
    font-weight: 400;
    padding: 0.85rem 1rem;
    border-radius: 4px;
    outline: none;
    transition: border-color 0.2s;
  }

  .input-group input:focus {
    border-color: var(--accent-dim);
  }

  .auto-login {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    margin: 1.2rem 0 1.8rem;
    cursor: pointer;
  }

  .auto-login input[type="checkbox"] {
    display: none;
  }

  .checkbox-custom {
    width: 16px;
    height: 16px;
    border: 1px solid var(--border-light);
    border-radius: 2px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s;
    flex-shrink: 0;
  }

  .auto-login input:checked + .checkbox-custom {
    background: var(--accent-dim);
    border-color: var(--accent-dim);
  }

  .auto-login input:checked + .checkbox-custom::after {
    content: '';
    width: 4px;
    height: 8px;
    border: solid var(--bg);
    border-width: 0 1.5px 1.5px 0;
    transform: rotate(45deg) translateY(-1px);
  }

  .auto-login span {
    font-size: 0.78rem;
    color: var(--text-dim);
    font-weight: 300;
  }

  .login-btn {
    width: 100%;
    background: transparent;
    border: 1px solid var(--border-light);
    color: var(--text-dim);
    font-family: var(--mono);
    font-size: 0.8rem;
    font-weight: 400;
    letter-spacing: 0.12em;
    padding: 0.9rem;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.25s;
    text-transform: lowercase;
  }

  .login-btn:hover {
    border-color: var(--accent-dim);
    color: var(--accent);
  }

  .login-btn:active {
    transform: scale(0.98);
  }

  .login-error {
    font-size: 0.75rem;
    color: var(--danger);
    text-align: center;
    margin-top: 1rem;
    min-height: 1.2em;
    font-weight: 300;
    opacity: 0;
    transition: opacity 0.3s;
  }

  .login-error.visible {
    opacity: 1;
  }

  /* ── LINKS SCREEN ── */
  .links-screen {
    display: none;
    min-height: 100dvh;
    padding: 2rem 1.5rem 4rem;
    max-width: 520px;
    margin: 0 auto;
    animation: fadeIn 0.5s ease;
  }

  .links-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 2.5rem;
    padding-top: 1rem;
  }

  .links-title {
    display: flex;
    align-items: center;
  }

  .logout-btn {
    background: none;
    border: none;
    color: var(--text-muted);
    font-family: var(--mono);
    font-size: 0.65rem;
    letter-spacing: 0.08em;
    cursor: pointer;
    padding: 0.4rem 0.6rem;
    border-radius: 3px;
    transition: color 0.2s;
    text-transform: lowercase;
  }

  .logout-btn:hover {
    color: var(--danger);
  }

  /* Category */
  .category {
    margin-bottom: 2rem;
  }

  .category-label {
    font-family: var(--mono);
    font-size: 0.6rem;
    font-weight: 500;
    letter-spacing: 0.18em;
    color: var(--text-muted);
    text-transform: uppercase;
    margin-bottom: 0.7rem;
    padding-left: 0.1rem;
  }

  /* Link Card */
  .link-card {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.95rem 1rem;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    margin-bottom: 0.5rem;
    text-decoration: none;
    color: var(--text);
    transition: all 0.2s;
    cursor: pointer;
  }

  .link-card:hover {
    background: var(--surface-hover);
    border-color: var(--border-light);
    transform: translateX(3px);
  }

  .link-card:active {
    transform: translateX(3px) scale(0.99);
  }

  .link-icon {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1rem;
    flex-shrink: 0;
    background: var(--bg);
    border: 1px solid var(--border);
  }

  .link-info {
    flex: 1;
    min-width: 0;
  }

  .link-name {
    font-size: 0.88rem;
    font-weight: 400;
    margin-bottom: 0.15rem;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-desc {
    font-size: 0.7rem;
    color: var(--text-dim);
    font-weight: 300;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .link-arrow {
    color: var(--text-muted);
    font-size: 0.75rem;
    flex-shrink: 0;
    transition: color 0.2s;
  }

  .link-card:hover .link-arrow {
    color: var(--accent-dim);
  }

  /* Footer */
  .links-footer {
    text-align: center;
    margin-top: 3rem;
    padding-top: 1.5rem;
    border-top: 1px solid var(--border);
  }

  .links-footer p {
    font-family: var(--mono);
    font-size: 0.6rem;
    color: var(--text-muted);
    letter-spacing: 0.1em;
  }

  /* Animations */
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .link-card {
    animation: cardIn 0.35s ease backwards;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: translateX(-6px); }
    to { opacity: 1; transform: translateX(0); }
  }

  /* Shake */
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-6px); }
    40% { transform: translateX(5px); }
    60% { transform: translateX(-4px); }
    80% { transform: translateX(3px); }
  }

  .shake {
    animation: shake 0.4s ease;
  }

  /* Responsive */
  @media (max-width: 480px) {
    .links-screen { padding: 1.5rem 1rem 3rem; }
    .link-card { padding: 0.85rem 0.9rem; }
  }
</style>
</head>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  CONFIG — 여기서 계정/링크 수정
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// 계정 목록 (SHA-256 해시 대신 평문 — 배포 전 해시로 교체 가능)
const ACCOUNTS = [
  { id: 'iggg.studio', pw: '!Gnagoya~~~' },
];

// 링크 데이터
const LINKS = [
  {
    category: '',
    items: [
      { name: '공사보고작성기', desc: 'iggg-report', url: 'https://iggg-report.vercel.app/', icon: '📝' },
      { name: '통합공정표관리', desc: 'iggg-ism', url: 'https://iggg-ism.vercel.app/', icon: '📋' },
      { name: '실측보고서 작성기', desc: 'iggg-report.com', url: 'https://iggg-report.com/', icon: '📐' },
      { name: 'disto 애벌세탁기', desc: 'ig-disto-z0', url: 'https://ig-disto-z0.vercel.app/', icon: '🧹' },
      { name: 'disto 실측세탁기', desc: 'ig-disto', url: 'https://ig-disto.vercel.app/', icon: '🧽' },
      { name: '이지키친(EZkitchen)', desc: 'igggstudio.com', url: 'https://igggstudio.com/', icon: '🍳' },
      { name: '간이조도계산기', desc: 'iggg-lighting', url: 'https://iggg-lighting.vercel.app/', icon: '💡' },
    ]
  }
];

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  AUTH LOGIC
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const TOKEN_KEY = 'ig_links_token';

function makeToken(id) {
  return btoa(id + ':' + Date.now());
}

function checkAutoLogin() {
  const token = localStorage.getItem(TOKEN_KEY);
  if (token) {
    try {
      const decoded = atob(token);
      const id = decoded.split(':')[0];
      if (ACCOUNTS.some(a => a.id === id)) {
        showLinks();
        return;
      }
    } catch {}
    localStorage.removeItem(TOKEN_KEY);
  }
}

function handleLogin() {
  const id = document.getElementById('userId').value.trim();
  const pw = document.getElementById('userPw').value;
  const auto = document.getElementById('autoLogin').checked;
  const errEl = document.getElementById('loginError');

  const account = ACCOUNTS.find(a => a.id === id && a.pw === pw);

  if (!account) {
    errEl.textContent = 'ID 또는 비밀번호가 일치하지 않습니다';
    errEl.classList.add('visible');
    document.querySelector('.login-box').classList.add('shake');
    setTimeout(() => document.querySelector('.login-box').classList.remove('shake'), 400);
    return;
  }

  if (auto) {
    localStorage.setItem(TOKEN_KEY, makeToken(id));
  }

  showLinks();
}

function handleLogout() {
  localStorage.removeItem(TOKEN_KEY);
  document.getElementById('linksScreen').style.display = 'none';
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('userId').value = '';
  document.getElementById('userPw').value = '';
  document.getElementById('loginError').classList.remove('visible');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

function showLinks() {
  document.getElementById('loginScreen').style.display = 'none';
  const screen = document.getElementById('linksScreen');
  screen.style.display = 'block';

  const container = document.getElementById('linksContainer');
  container.innerHTML = '';

  let cardIndex = 0;

  LINKS.forEach(group => {
    const cat = document.createElement('div');
    cat.className = 'category';

    if (group.category) {
      const label = document.createElement('div');
      label.className = 'category-label';
      label.textContent = group.category;
      cat.appendChild(label);
    }

    group.items.forEach(item => {
      const a = document.createElement('a');
      a.className = 'link-card';
      a.href = item.url;
      a.target = '_blank';
      a.rel = 'noopener noreferrer';
      a.style.animationDelay = `${cardIndex * 0.05}s`;
      a.innerHTML = `
        <div class="link-icon">${item.icon}</div>
        <div class="link-info">
          <div class="link-name">${item.name}</div>
          <div class="link-desc">${item.desc}</div>
        </div>
        <div class="link-arrow">→</div>
      `;
      cat.appendChild(a);
      cardIndex++;
    });

    container.appendChild(cat);
  });
}

// Enter 키 로그인
document.addEventListener('keydown', e => {
  if (e.key === 'Enter' && document.getElementById('loginScreen').style.display !== 'none') {
    handleLogin();
  }
});

// 자동 로그인 체크
checkAutoLogin();
</script>
